<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fafafa;
      background: transparent;
    }
    .label {
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .dropzone {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 76px;
      padding: 0 1rem;
      border-radius: 8px;
      background: #262730;
      border: 1px solid #33343f;
      box-sizing: border-box;
    }
    .hint {
      color: #b8bdc9;
      font-size: 0.9rem;
      margin-top: 0.2rem;
    }
    .file {
      margin-top: 0.75rem;
      color: #fafafa;
      font-size: 0.95rem;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid #ff4b4b;
      background: transparent;
      color: #ff4b4b;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="label" class="label">Upload Qlik script</div>
  <div id="dropzone" class="dropzone">
    <div>
      <div><strong>Drag and drop file here</strong></div>
      <div class="hint">Limit 20MB per file - QVS, TXT</div>
    </div>
    <label class="button">
      Browse files
      <input id="file-input" type="file" accept=".qvs,.txt,text/plain">
    </label>
  </div>
  <div id="selected-file" class="file"></div>
  <script>
    const input = document.getElementById("file-input");
    const dropzone = document.getElementById("dropzone");
    const selectedFile = document.getElementById("selected-file");
    const label = document.getElementById("label");

    function sendMessage(type, data) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
    }

    function setHeight() {
      sendMessage("streamlit:setFrameHeight", { height: document.body.scrollHeight });
    }

    function setValue(value) {
      sendMessage("streamlit:setComponentValue", { value });
    }

    function showError(message) {
      selectedFile.textContent = message;
      selectedFile.style.color = "#ff4b4b";
      setHeight();
    }

    function handleFile(file) {
      if (!file) return;
      const name = file.name || "uploaded.qvs";
      const lowerName = name.toLowerCase();
      if (!lowerName.endsWith(".qvs") && !lowerName.endsWith(".txt")) {
        showError("Please choose a .qvs or .txt file.");
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        showError("File is larger than 20MB.");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        selectedFile.textContent = name;
        selectedFile.style.color = "#fafafa";
        setValue({ name, size: file.size, content: String(reader.result || "") });
        setHeight();
      };
      reader.onerror = () => showError("Could not read the selected file.");
      reader.readAsText(file);
    }

    input.addEventListener("change", () => handleFile(input.files[0]));
    dropzone.addEventListener("dragover", event => {
      event.preventDefault();
      dropzone.style.borderColor = "#ff4b4b";
    });
    dropzone.addEventListener("dragleave", () => {
      dropzone.style.borderColor = "#33343f";
    });
    dropzone.addEventListener("drop", event => {
      event.preventDefault();
      dropzone.style.borderColor = "#33343f";
      handleFile(event.dataTransfer.files[0]);
    });

    window.addEventListener("message", event => {
      if (!event.data || event.data.type !== "streamlit:render") return;
      const args = event.data.args || {};
      if (args.label) label.textContent = args.label;
      setHeight();
    });

    sendMessage("streamlit:componentReady", { apiVersion: 1 });
    setHeight();
  </script>
</body>
</html>
